name: peufmreader

services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: peufmreader
      POSTGRES_USER: peufmreader
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      # PostgreSQL 18 stores data in a major-version subdirectory below this mount.
      - ${PEUFM_DATA_ROOT:-./data}/postgres:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U peufmreader -d peufmreader"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  app:
    build:
      context: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_NAME: peufmreader
      DB_USER: peufmreader
      DB_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?set ADMIN_PASSWORD in .env}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      SESSION_TTL: ${SESSION_TTL:-720h}
      TRUSTED_PROXY_CIDR: ${TRUSTED_PROXY_CIDR:-}
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-524288000}
      AI_PROVIDER: ${AI_PROVIDER:-}
      AI_BASE_URL: ${AI_BASE_URL:-}
      AI_MODEL: ${AI_MODEL:-}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_TIMEOUT: ${AI_TIMEOUT:-45s}
      CALIBRE_LIBRARY_ROOT: /import/calibre
      IMPORT_ROOT: /data/import
      IMPORT_SCAN_INTERVAL: ${IMPORT_SCAN_INTERVAL:-10s}
      IMPORT_STABLE_AGE: ${IMPORT_STABLE_AGE:-10s}
      BIBLIOGRAPHY_PROVIDERS: ${BIBLIOGRAPHY_PROVIDERS-openlibrary}
      OPEN_LIBRARY_BASE_URL: ${OPEN_LIBRARY_BASE_URL:-https://openlibrary.org}
      GOOGLE_BOOKS_BASE_URL: ${GOOGLE_BOOKS_BASE_URL:-https://www.googleapis.com/books/v1}
      GOOGLE_BOOKS_API_KEY: ${GOOGLE_BOOKS_API_KEY:-}
      BIBLIOGRAPHY_TIMEOUT: ${BIBLIOGRAPHY_TIMEOUT:-12s}
      PDF_OCR_MODE: ${PDF_OCR_MODE:-auto}
      PDF_OCR_LANGUAGES: ${PDF_OCR_LANGUAGES:-chi_sim+eng}
      PDF_OCR_MAX_PAGES: ${PDF_OCR_MAX_PAGES:-500}
      PDF_OCR_DPI: ${PDF_OCR_DPI:-180}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${APP_PORT:-8080}:8080"
    volumes:
      - ${PEUFM_DATA_ROOT:-./data}/library:/data/library
      - ${PEUFM_DATA_ROOT:-./data}/staging:/data/staging
      - ${PEUFM_DATA_ROOT:-./data}/cache:/data/cache
      - ${PEUFM_IMPORT_ROOT:-./data/import}:/data/import
      - ${CALIBRE_LIBRARY_PATH:-./data/calibre}:/import/calibre:ro
    user: "${PUID:-99}:${PGID:-100}"
    read_only: true
    tmpfs:
      - /tmp:size=256m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

volumes: {}
