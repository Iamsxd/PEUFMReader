name: peufmreader

services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: peufmreader
      POSTGRES_USER: peufmreader
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      # PostgreSQL 18 stores data in a major-version subdirectory below this mount.
      - ${PEUFM_DATA_ROOT:-./data}/postgres:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U peufmreader -d peufmreader"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  app:
    build:
      context: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_NAME: peufmreader
      DB_USER: peufmreader
      DB_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?set ADMIN_PASSWORD in .env}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      SESSION_TTL: ${SESSION_TTL:-720h}
      TRUSTED_PROXY_CIDR: ${TRUSTED_PROXY_CIDR:-}
      PUBLIC_ACCESS: ${PUBLIC_ACCESS:-false}
      PUBLIC_URL: ${PUBLIC_URL:-}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-}
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OIDC_REDIRECT_URL: ${OIDC_REDIRECT_URL:-}
      OIDC_USERNAME_CLAIM: ${OIDC_USERNAME_CLAIM:-preferred_username}
      OIDC_GROUPS_CLAIM: ${OIDC_GROUPS_CLAIM:-groups}
      OIDC_ADMIN_GROUP: ${OIDC_ADMIN_GROUP:-}
      LDAP_URL: ${LDAP_URL:-}
      LDAP_START_TLS: ${LDAP_START_TLS:-false}
      LDAP_BASE_DN: ${LDAP_BASE_DN:-}
      LDAP_BIND_DN: ${LDAP_BIND_DN:-}
      LDAP_BIND_PASSWORD: ${LDAP_BIND_PASSWORD:-}
      LDAP_USER_FILTER: ${LDAP_USER_FILTER:-}
      LDAP_USERNAME_ATTRIBUTE: ${LDAP_USERNAME_ATTRIBUTE:-uid}
      LDAP_ADMIN_GROUP_DN: ${LDAP_ADMIN_GROUP_DN:-}
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-524288000}
      AI_PROVIDER: ${AI_PROVIDER:-}
      AI_BASE_URL: ${AI_BASE_URL:-}
      AI_MODEL: ${AI_MODEL:-}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_TIMEOUT: ${AI_TIMEOUT:-45s}
      CALIBRE_LIBRARY_ROOT: /import/calibre
      IMPORT_ROOT: /data/import
      IMPORT_ROOT_LABEL: ${PEUFM_IMPORT_ROOT:-./data/import}
      IMPORT_SCAN_INTERVAL: ${IMPORT_SCAN_INTERVAL:-10s}
      IMPORT_STABLE_AGE: ${IMPORT_STABLE_AGE:-10s}
      WATCH_LIBRARY_ENABLED: ${WATCH_LIBRARY_ENABLED:-false}
      WATCH_LIBRARY_ROOT: /watch/library
      WATCH_LIBRARY_LABEL: ${WATCH_LIBRARY_PATH:-./data/watch-library}
      WATCH_LIBRARY_SCAN_INTERVAL: ${WATCH_LIBRARY_SCAN_INTERVAL:-1m}
      WATCH_LIBRARY_STABLE_AGE: ${WATCH_LIBRARY_STABLE_AGE:-30s}
      BIBLIOGRAPHY_PROVIDERS: ${BIBLIOGRAPHY_PROVIDERS-openlibrary}
      OPEN_LIBRARY_BASE_URL: ${OPEN_LIBRARY_BASE_URL:-https://openlibrary.org}
      GOOGLE_BOOKS_BASE_URL: ${GOOGLE_BOOKS_BASE_URL:-https://www.googleapis.com/books/v1}
      GOOGLE_BOOKS_API_KEY: ${GOOGLE_BOOKS_API_KEY:-}
      DOUBAN_API_BASE_URL: ${DOUBAN_API_BASE_URL:-}
      BIBLIOGRAPHY_TIMEOUT: ${BIBLIOGRAPHY_TIMEOUT:-12s}
      PDF_OCR_MODE: ${PDF_OCR_MODE:-auto}
      PDF_OCR_LANGUAGES: ${PDF_OCR_LANGUAGES:-chi_sim+eng}
      PDF_OCR_MAX_PAGES: ${PDF_OCR_MAX_PAGES:-8}
      PDF_OCR_DPI: ${PDF_OCR_DPI:-180}
      MOBI_CONVERTER_BIN: ${MOBI_CONVERTER_BIN:-mobitool}
      MOBI_CONVERSION_TIMEOUT: ${MOBI_CONVERSION_TIMEOUT:-2m}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${APP_PORT:-8080}:8080"
    volumes:
      - ${PEUFM_DATA_ROOT:-./data}/library:/data/library
      - ${PEUFM_DATA_ROOT:-./data}/staging:/data/staging
      - ${PEUFM_DATA_ROOT:-./data}/cache:/data/cache
      - ${PEUFM_IMPORT_ROOT:-./data/import}:/data/import
      - ${WATCH_LIBRARY_PATH:-./data/watch-library}:/watch/library:ro
      - ${CALIBRE_LIBRARY_PATH:-./data/calibre}:/import/calibre:ro
    user: "${PUID:-99}:${PGID:-100}"
    read_only: true
    tmpfs:
      - /tmp:size=256m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  backup:
    image: postgres:18-alpine
    profiles: ["tools"]
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGHOST: db
      PGUSER: peufmreader
      PGDATABASE: peufmreader
      PGPASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    user: "${PUID:-99}:${PGID:-100}"
    volumes:
      - ${PEUFM_DATA_ROOT:-./data}/library:/restore/library
      - ${PEUFM_DATA_ROOT:-./data}/cache:/restore/cache
      - ${PEUFM_IMPORT_ROOT:-./data/import}:/restore/import
      - ${PEUFM_BACKUP_ROOT:-./backups}:/backup
      - ./scripts:/tools:ro
    entrypoint: ["/bin/sh", "/tools/backup-container.sh"]
    restart: "no"

volumes: {}
